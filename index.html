<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scramble Tunnel Prototype</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #07090f;
      color: #e8ecff;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      position: relative;
      text-align: center;
    }
    canvas {
      width: min(92vw, 960px);
      height: auto;
      max-height: 72vh;
      border: 1px solid #2a365f;
      box-shadow: 0 0 32px rgba(90, 140, 255, 0.2);
      background: linear-gradient(#02040a, #060b18);
      image-rendering: pixelated;
    }
    .help {
      margin-top: 10px;
      color: #9db0ff;
      font-size: 14px;
    }
    .mobile-controls {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .mobile-controls button {
      appearance: none;
      border: 1px solid #4d5f95;
      background: linear-gradient(180deg, #1b2a52, #10192f);
      color: #eef4ff;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }
    .mobile-controls button:disabled {
      opacity: 0.55;
    }
    .mobile-controls .restart {
      border-color: #8b6c3c;
      background: linear-gradient(180deg, #5a3f15, #2c1e08);
    }
    .mobile-controls .start {
      border-color: #3f8b72;
      background: linear-gradient(180deg, #17604c, #0f362c);
    }
    .hud-start {
      position: absolute;
      top: 12px;
      left: 160px;
      z-index: 2;
      padding: 8px 14px;
      font-size: 14px;
    }
    .status {
      min-height: 1.4em;
      color: #b9c8ff;
      font-size: 13px;
    }
    .touch-pad {
      position: relative;
      z-index: 1;
      display: none;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 8px;
      pointer-events: auto;
    }
    .touch-up {
      grid-column: 2;
      grid-row: 1;
    }
    .touch-left {
      grid-column: 1;
      grid-row: 2;
    }
    .touch-right {
      grid-column: 3;
      grid-row: 2;
    }
    .touch-down {
      grid-column: 2;
      grid-row: 3;
    }
    .fire-pad {
      position: relative;
      z-index: 1;
      display: none;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .touch-fire {
      border-color: #9d6038;
      background: rgba(80, 34, 14, 0.82);
      font-size: 18px;
      width: 62px;
      height: 62px;
      border-radius: 16px;
    }
    .touch-btn {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid #3f558e;
      background: rgba(16, 28, 56, 0.72);
      color: #f2f6ff;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .touch-btn:active,
    .touch-btn.active {
      background: rgba(71, 118, 224, 0.86);
      border-color: #7db0ff;
      transform: translateY(1px);
    }
    .controls-bottom {
      position: absolute;
      right: 36px;
      bottom: 18px;
      z-index: 3;
      display: flex;
      gap: 14px;
      align-items: flex-end;
      pointer-events: none;
    }
    .controls-bottom > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="960" height="540" aria-label="Scramble tunnel game"></canvas>
    <div id="gyroStatus" class="status" style="display:none"></div>
    <div class="controls-bottom" aria-hidden="false">
      <div id="firePad" class="fire-pad" aria-label="発射ボタン">
        <button id="touchFire" class="touch-btn touch-fire" type="button" aria-label="バルカン発射">X</button>
        <button id="touchBomb" class="touch-btn touch-bomb" type="button" aria-label="爆弾投下">💣</button>
      </div>
      <div id="touchPad" class="touch-pad" aria-label="タッチコントローラー">
        <button id="touchUp" class="touch-btn touch-up" type="button" aria-label="上昇">▲</button>
        <button id="touchLeft" class="touch-btn touch-left" type="button" aria-label="左移動">◀</button>
        <button id="touchRight" class="touch-btn touch-right" type="button" aria-label="右移動">▶</button>
        <button id="touchDown" class="touch-btn touch-down" type="button" aria-label="下降">▼</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const gyroStatus = document.getElementById("gyroStatus");
    const touchPad = document.getElementById("touchPad");
    const firePad = document.getElementById("firePad");
    const touchUp = document.getElementById("touchUp");
    const touchLeft = document.getElementById("touchLeft");
    const touchFire = document.getElementById("touchFire");
    const touchBomb = document.getElementById("touchBomb");
    const touchRight = document.getElementById("touchRight");
    const touchDown = document.getElementById("touchDown");

    const startButton = document.createElement("button");
    startButton.id = "startButton";
    startButton.type = "button";
    startButton.className = "start hud-start";
    startButton.textContent = "スタート";
    document.querySelector(".wrap").appendChild(startButton);

    const state = {
      running: true,
      score: 0,
      speed: 2.6,
      maxSpeed: 6.2,
      bullets: [],
      bombs: [],
      bases: [],
      explosions: [],
      scrollSpeed: 2.6,
      bonusText: "",
      bonusTimer: 0,
      columns: [],
      stars: [],
      frame: 0,
      displayScore: 0,
      ship: {
        x: 130,
        y: canvas.height / 2,
        vx: 0,
        vy: 0,
        radius: 11,
        hp: 100,
        contactFrames: 0
      },
      hpItems: [],
      // single mega HP per stage
      megaHp: null,
      megaHpSpawned: false,
      input: { up: false, down: false, left: false, right: false },
      effects: {
        slowTimer: 0,
        wideTimer: 0
      }
      ,
      // stage system
      stage: 1,
      stageTimer: 0, // frames elapsed in current stage
      stageDuration: 60, // seconds per stage
      caption: "",
      captionTimer: 0, // frames to show caption
      pendingStageAdvance: false
      ,
      gameOver: false
      ,
      goalHold: { active: false, frames: 0 },
      // stage intro: phases: 'countdown' -> 'narrow'
      stageIntro: { active: false, frames: 0, total: 0, startGap: 0, phase: null },
      // arena bullets during intro
      // spawnInterval: larger => fewer waves (frames)
      arena: { bullets: [], spawnTimer: 0, spawnInterval: 60 }
    };

    const tunnel = {
      center: canvas.height / 2,
      centerVel: 0,
      gap: 170,
      minGap: 96,
      maxGap: 220,
      roughness: 0.42,
      baseSpawnChance: 0.0014
    };

    const baseColors = ["red", "blue", "yellow"];
    const baseStyles = {
      red: { fill: "#cf3946", edge: "#ff8f95" },
      blue: { fill: "#2e67c9", edge: "#89b5ff" },
      yellow: { fill: "#c89c26", edge: "#ffdf85" }
    };

    for (let i = 0; i < 160; i++) {
      state.stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: 0.4 + Math.random() * 0.9
      });
    }

    function seedColumns() {
      state.columns.length = 0;
      let localCenter = tunnel.center;
      for (let x = 0; x < canvas.width; x++) {
        state.columns.push(makeColumn(localCenter, tunnel.gap));
      }
    }

    function makeColumn(center, gap) {
      const half = gap * 0.5;
      return {
        top: Math.max(20, center - half),
        bottom: Math.min(canvas.height - 20, center + half)
      };
    }

    function resetGame() {
      state.running = true;
      state.score = 0;
      state.speed = 2.6;
      state.frame = 0;
      state.ship.x = 130;
      state.ship.y = canvas.height / 2;
      state.ship.vx = 0;
      state.ship.vy = 0;
      state.bullets.length = 0;
      state.bombs.length = 0;
      state.bases.length = 0;
      state.explosions.length = 0;
      state.bonusText = "";
      state.bonusTimer = 0;
      state.effects.slowTimer = 0;
      state.effects.wideTimer = 0;
      state.ship.hp = 100;
      state.ship.contactFrames = 0;
      // reset stage
      state.stage = 1;
      state.stageTimer = 0;
      state.caption = "";
      state.captionTimer = 0;
      state.pendingStageAdvance = false;
      state.gameOver = false;
      state.megaHp = null;
      state.megaHpSpawned = false;
      state.stageIntro = { active: false, frames: 0, total: 0, startGap: 0 };
      state.arena.bullets.length = 0;
      state.arena.spawnTimer = 0;
      state.displayScore = 0;

      tunnel.center = canvas.height / 2;
      tunnel.centerVel = 0;
      tunnel.gap = 170;
      seedColumns();
    }

    function startGame() {
      resetGame();
      updateGyroStatus("開始しました。右下コントローラーで操作できます");
      // begin stage with wide intro
      beginStage();
    }

    function updateGyroStatus(message) {
      gyroStatus.textContent = message;
    }

    function grantBaseBonus(color) {
      if (color === "red") {
        state.score += 180;
        state.bonusText = "RED BONUS +180 SCORE";
      } else if (color === "blue") {
        state.effects.slowTimer = 360;
        state.bonusText = "BLUE BONUS TUNNEL SLOW";
      } else {
        state.score += 80;
        state.effects.wideTimer = 360;
        state.bonusText = "YELLOW BONUS WIDE GAP";
      }
      state.bonusTimer = 140;
    }

    function createExplosion(x, y, color) {
      const particles = [];
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.26;
        const speed = 1.4 + Math.random() * 3.1;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 30 + Math.floor(Math.random() * 12),
          maxLife: 42,
          color
        });
      }
      state.explosions.push(...particles);
    }

    function spawnBaseAtRight() {
      const x = canvas.width + 16;
      const col = state.columns[Math.max(0, canvas.width - 2)];
      if (!col) return;

      const width = 14 + Math.random() * 14;
      const maxProtrusion = Math.max(12, Math.min(28, (col.bottom - col.top) * 0.42));
      const protrusion = 12 + Math.random() * (maxProtrusion - 12);
      const side = Math.random() < 0.5 ? "top" : "bottom";
      const color = baseColors[(Math.random() * baseColors.length) | 0];

      if (side === "top") {
        state.bases.push({ x, y: col.top, w: width, h: protrusion, side, color });
      } else {
        state.bases.push({ x, y: col.bottom - protrusion, w: width, h: protrusion, side, color });
      }
    }

    function shiftBases(step) {
      for (let i = 0; i < step; i++) {
        for (const base of state.bases) {
          base.x -= 1;
        }
        if (Math.random() < tunnel.baseSpawnChance) {
          spawnBaseAtRight();
        }
      }
      state.bases = state.bases.filter((b) => b.x + b.w > -24);
    }

    function circleRectHit(cx, cy, cr, rx, ry, rw, rh) {
      const nearestX = Math.max(rx, Math.min(cx, rx + rw));
      const nearestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - nearestX;
      const dy = cy - nearestY;
      return dx * dx + dy * dy <= cr * cr;
    }

    function fireVulcan() {
      if (!state.running) return;
      const shipSpeed = Math.max(1, Math.hypot(state.ship.vx, state.ship.vy));
      const bulletSpeed = shipSpeed * 10;
      state.bullets.push({
        x: state.ship.x + state.ship.radius + 6,
        y: state.ship.y,
        vx: bulletSpeed,
        vy: state.ship.vy * 0.12,
        radius: 3
      });
    }

    function updateTunnel() {
      const drift = (Math.random() - 0.5) * tunnel.roughness;
      tunnel.centerVel += drift;
      tunnel.centerVel *= 0.96;
      tunnel.center += tunnel.centerVel;
      tunnel.center = Math.max(90, Math.min(canvas.height - 90, tunnel.center));

      const wave = Math.sin(state.frame * 0.012) * 22;
      const wideBonus = state.effects.wideTimer > 0 ? 24 : 0;
      const gapTarget = 145 + wave - Math.min(38, state.speed * 7) + wideBonus;
      tunnel.gap += (gapTarget - tunnel.gap) * 0.03;
      tunnel.gap = Math.max(tunnel.minGap, Math.min(tunnel.maxGap, tunnel.gap));
    }

    function updateColumns() {
      const step = state.scrollSpeed;
      for (let i = 0; i < step; i++) {
        state.columns.shift();
        updateTunnel();
        state.columns.push(makeColumn(tunnel.center, tunnel.gap));
      }
      shiftBases(step);
    }

    function updateShip() {
      const verticalThrust = 0.34;
      const horizontalThrust = 0.28;
      const drag = 0.985;
      if (state.input.up) state.ship.vy -= verticalThrust;
      if (state.input.down) state.ship.vy += verticalThrust;
      if (state.input.left) state.ship.vx -= horizontalThrust;
      if (state.input.right) state.ship.vx += horizontalThrust;
      state.ship.vx *= drag;
      state.ship.vy *= drag;
      state.ship.x += state.ship.vx;
      state.ship.y += state.ship.vy;
      state.ship.x = Math.max(state.ship.radius + 8, Math.min(canvas.width - state.ship.radius - 8, state.ship.x));
      state.ship.y = Math.max(state.ship.radius, Math.min(canvas.height - state.ship.radius, state.ship.y));
    }

    function checkCollision() {
      const x = Math.floor(state.ship.x);
      const column = state.columns[x];
      if (!column) return false;
      return (
        state.ship.y - state.ship.radius < column.top ||
        state.ship.y + state.ship.radius > column.bottom
      );
    }

    // returns penetration amount in pixels (0 if no collision)
    function getCollisionPenetration() {
      const x = Math.floor(state.ship.x);
      const column = state.columns[x];
      if (!column) return 0;
      if (state.ship.y - state.ship.radius < column.top) {
        return column.top - (state.ship.y - state.ship.radius);
      }
      if (state.ship.y + state.ship.radius > column.bottom) {
        return (state.ship.y + state.ship.radius) - column.bottom;
      }
      return 0;
    }

    function updateStars() {
      for (const s of state.stars) {
        s.x -= state.scrollSpeed * s.z * 0.4;
        if (s.x < -2) {
          s.x = canvas.width + Math.random() * 16;
          s.y = Math.random() * canvas.height;
        }
      }
    }

    function updateBullets() {
      for (const b of state.bullets) {
        b.x += b.vx;
        b.y += b.vy;
      }

      const hitBases = new Set();
      const hitBullets = new Set();
      for (let i = 0; i < state.bullets.length; i++) {
        const b = state.bullets[i];
        for (let j = 0; j < state.bases.length; j++) {
          if (hitBases.has(j)) continue;
          const base = state.bases[j];
          if (circleRectHit(b.x, b.y, b.radius, base.x, base.y, base.w, base.h)) {
            hitBases.add(j);
            hitBullets.add(i);
            grantBaseBonus(base.color);
            createExplosion(base.x + base.w * 0.5, base.y + base.h * 0.5, base.color);
            break;
          }
        }
      }

      if (hitBases.size > 0) {
        state.bases = state.bases.filter((_, idx) => !hitBases.has(idx));
      }
      if (hitBullets.size > 0) {
        state.bullets = state.bullets.filter((_, idx) => !hitBullets.has(idx));
      }

      state.bullets = state.bullets.filter(
        (b) => b.x < canvas.width + 40 && b.y > -20 && b.y < canvas.height + 20
      );
    }

    function dropBomb() {
      if (!state.running) return;
      const initialVx = state.ship.vx * 0.6 + 1.2;
      state.bombs.push({
        x: state.ship.x - 6,
        y: state.ship.y + 6,
        vx: initialVx,
        vy: 0,
        radius: 6
      });
    }

    function updateBombs() {
      const gravity = 0.42;
      const toRemove = new Set();
      for (let i = 0; i < state.bombs.length; i++) {
        const b = state.bombs[i];
        b.vy += gravity;
        b.x += b.vx;
        b.y += b.vy;

        // hit base?
        for (let j = 0; j < state.bases.length; j++) {
          const base = state.bases[j];
          if (circleRectHit(b.x, b.y, b.radius, base.x, base.y, base.w, base.h)) {
            // explode and apply bonuses to affected bases within blast radius
            const blastR = 36;
            createExplosion(b.x, b.y, base.color);
            const removed = [];
            for (let k = 0; k < state.bases.length; k++) {
              const bb = state.bases[k];
              if (circleRectHit(b.x, b.y, blastR, bb.x, bb.y, bb.w, bb.h)) {
                grantBaseBonus(bb.color);
                removed.push(k);
              }
            }
            state.bases = state.bases.filter((_, idx) => !removed.includes(idx));
            toRemove.add(i);
            break;
          }
        }

        // hit floor or ceiling
        if (b.y > canvas.height - 4 || b.y < 4) {
          createExplosion(b.x, Math.max(4, Math.min(canvas.height - 4, b.y)), "red");
          toRemove.add(i);
        }
      }
      if (toRemove.size > 0) {
        state.bombs = state.bombs.filter((_, idx) => !toRemove.has(idx));
      }

      state.bombs = state.bombs.filter((b) => b.x > -60 && b.x < canvas.width + 60 && b.y < canvas.height + 200);
    }

    // --- HP 回復アイテム (ゆらゆら浮遊) ---
    function spawnHpItem() {
      const x = canvas.width + 24;
      // spawn within tunnel gap area near center of current column at right edge
      const col = state.columns[Math.max(0, canvas.width - 2)];
      let baseY = canvas.height / 2;
      if (col) {
        // choose a y between column.top + 16 and column.bottom - 16
        baseY = Math.max(col.top + 16, Math.min(col.bottom - 16, col.top + Math.random() * (col.bottom - col.top - 32)));
      } else {
        baseY = 40 + Math.random() * (canvas.height - 80);
      }
      const phase = Math.random() * Math.PI * 2;
      const item = {
        x,
        baseY,
        radius: 12,
        vx: 0.6 + Math.random() * 0.8,
        phase,
        bobAmp: 6 + Math.random() * 6
      };
      state.hpItems.push(item);
    }

    function updateHpItems() {
      // occasional spawn (不定期)
      const HP_SPAWN_CHANCE = 0.00064; // reduced to ~1/5 the previous rate
      if (Math.random() < HP_SPAWN_CHANCE) spawnHpItem();

      const collected = new Set();
      for (let i = 0; i < state.hpItems.length; i++) {
        const it = state.hpItems[i];
        it.x -= state.scrollSpeed * 0.9 + it.vx;
        // bobbing using global frame so movement is smooth
        it.y = it.baseY + Math.sin(state.frame * 0.06 + it.phase) * it.bobAmp;

        // collision with ship
        const dx = it.x - state.ship.x;
        const dy = it.y - state.ship.y;
        const dist2 = dx * dx + dy * dy;
        const r = it.radius + state.ship.radius;
        if (dist2 <= r * r) {
          collected.add(i);
          // heal
          state.ship.hp = Math.min(100, (state.ship.hp || 0) + 10);
          state.bonusText = "HP +10";
          state.bonusTimer = 90;
          // small visual feedback
          createExplosion(it.x, it.y, "blue");
        }
      }

      if (collected.size > 0) {
        state.hpItems = state.hpItems.filter((_, idx) => !collected.has(idx));
      }

      // remove offscreen
      state.hpItems = state.hpItems.filter((it) => it.x > -40 && it.y > -40 && it.y < canvas.height + 40);
    }

    function drawHpItems() {
      for (const it of state.hpItems) {
        const x = it.x;
        const y = it.y;

        // --- background document icon (rounded rect with folded corner) ---
        const bgW = 56;
        const bgH = 44;
        const bgX = x - bgW / 2;
        const bgY = y - bgH / 2 - 6;
        const r = 8;

        // shadow
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        roundRect(ctx, bgX + 3, bgY + 6, bgW, bgH, r);
        ctx.fill();

        // body
        ctx.fillStyle = "#ffffff";
        roundRect(ctx, bgX, bgY, bgW, bgH, r);
        ctx.fill();

        // folded corner (top-right)
        ctx.fillStyle = "rgba(240,240,240,0.98)";
        ctx.beginPath();
        ctx.moveTo(bgX + bgW - 12, bgY);
        ctx.lineTo(bgX + bgW, bgY);
        ctx.lineTo(bgX + bgW, bgY + 12);
        ctx.closePath();
        ctx.fill();

        // inner image area (gradient) to mimic PNG preview
        const imgPad = 8;
        const imgX = bgX + imgPad;
        const imgY = bgY + imgPad - 2;
        const imgW = bgW - imgPad * 2;
        const imgH = bgH - imgPad * 2 - 4;
        const g = ctx.createLinearGradient(imgX, imgY, imgX, imgY + imgH);
        g.addColorStop(0, "#accfff");
        g.addColorStop(1, "#5aa0ff");
        ctx.fillStyle = g;
        roundRect(ctx, imgX, imgY, imgW, imgH, 6);
        ctx.fill();

        // subtle inner border
        ctx.strokeStyle = "rgba(0,0,0,0.06)";
        ctx.lineWidth = 1;
        roundRect(ctx, bgX + 0.5, bgY + 0.5, bgW - 1, bgH - 1, r);
        ctx.stroke();

        // --- glasses in front (Nouns風) ---
        const lensW = 14;
        const lensH = 10;
        const gap = 6;
        const leftCx = x - lensW - gap / 2;
        const rightCx = x + gap / 2;

        // frame shadow
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        roundRect(ctx, leftCx - lensW / 2 + 2, y - lensH - 2 + 3, lensW + 4, lensH * 2 + 4, 4);
        ctx.fill();
        roundRect(ctx, rightCx - lensW / 2 + 2, y - lensH - 2 + 3, lensW + 4, lensH * 2 + 4, 4);
        ctx.fill();

        // frame body
        ctx.fillStyle = "#0b1b22";
        roundRect(ctx, leftCx - lensW / 2, y - lensH, lensW, lensH * 2, 4);
        ctx.fill();
        roundRect(ctx, rightCx - lensW / 2, y - lensH, lensW, lensH * 2, 4);
        ctx.fill();

        // bridge
        roundRect(ctx, leftCx + lensW / 2, y - 4, gap + 2, 8, 3);
        ctx.fill();

        // lens tint (slightly greenish)
        ctx.fillStyle = "rgba(170,245,200,0.14)";
        roundRect(ctx, leftCx - lensW / 2 + 2, y - lensH + 2, lensW - 4, lensH * 2 - 4, 3);
        ctx.fill();
        roundRect(ctx, rightCx - lensW / 2 + 2, y - lensH + 2, lensW - 4, lensH * 2 - 4, 3);
        ctx.fill();

        // specular highlight
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.beginPath();
        ctx.ellipse(leftCx - 2, y - 2, 4, 2.2, -0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(rightCx - 2, y - 2, 4, 2.2, -0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // --- Mega HP (stage-once, full heal) ---
    function spawnMegaHp() {
      const x = canvas.width + 40;
      const col = state.columns[Math.max(0, canvas.width - 2)];
      let baseY = canvas.height / 2;
      if (col) baseY = Math.max(col.top + 24, Math.min(col.bottom - 24, col.top + Math.random() * (col.bottom - col.top - 48)));
      state.megaHp = {
        x,
        baseY,
        y: baseY,
        vx: 0.5 + Math.random() * 0.6,
        phase: Math.random() * Math.PI * 2,
        bobAmp: 8,
        radius: 18,
        hue: Math.floor(Math.random() * 360)
      };
      state.megaHpSpawned = true;
    }

    function updateMegaHp() {
      if (!state.megaHp) {
        // check spawn timing: spawn once per stage in later half (60%)
        const stageSecs = state.stageDuration + (state.stage - 1) * 10;
        const stageFrames = Math.round(stageSecs * 60);
        const spawnFrame = Math.round(stageFrames * 0.6);
        if (!state.megaHpSpawned && state.stageTimer >= spawnFrame) {
          spawnMegaHp();
        }
        return;
      }

      const it = state.megaHp;
      it.x -= state.scrollSpeed * 0.9 + it.vx;
      it.y = it.baseY + Math.sin(state.frame * 0.06 + it.phase) * it.bobAmp;

      // collision with ship
      const dx = it.x - state.ship.x;
      const dy = it.y - state.ship.y;
      const dist2 = dx * dx + dy * dy;
      const r = it.radius + state.ship.radius;
      if (dist2 <= r * r) {
        // full heal
        state.ship.hp = 100;
        state.bonusText = "HP FULL";
        state.bonusTimer = 140;
        createExplosion(it.x, it.y, "yellow");
        state.megaHp = null;
      }

      // remove if offscreen
      if (it.x < -80) state.megaHp = null;
    }

    function drawMegaHp() {
      const it = state.megaHp;
      if (!it) return;
      // pulsing radial glow with hue
      const pulse = 0.5 + 0.5 * Math.sin(state.frame * 0.08 + it.phase);
      const outerR = it.radius * (1.6 + pulse * 0.6);
      const grd = ctx.createRadialGradient(it.x, it.y, it.radius * 0.2, it.x, it.y, outerR);
      const h = it.hue;
      grd.addColorStop(0, `hsla(${h},100%,75%,0.98)`);
      grd.addColorStop(0.4, `hsla(${h},90%,60%,0.55)`);
      grd.addColorStop(1, `hsla(${(h + 40) % 360},80%,50%,0.08)`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(it.x, it.y, outerR, 0, Math.PI * 2);
      ctx.fill();

      // central badge (white circle)
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(it.x, it.y, it.radius * 0.8, 0, Math.PI * 2);
      ctx.fill();

      // plus sign
      ctx.fillStyle = `hsl(${h},70%,30%)`;
      ctx.fillRect(it.x - 3, it.y - 10, 6, 20);
      ctx.fillRect(it.x - 10, it.y - 3, 20, 6);
    }

    // Arena bullets during stage intro
    // return arena parameters based on stage (difficulty scales with stage)
    function getArenaParams(stage) {
      const s = Math.max(1, stage);
      const spawnInterval = Math.max(30, 80 - (s - 1) * 6);
      const sideSpawnChance = Math.min(0.95, 0.6 + (s - 1) * 0.05);
      const fastProb = Math.min(0.4, 0.05 + (s - 1) * 0.03);
      const baseMult = 5 + (s - 1) * 0.3;
      const fastMult = 12 + (s - 1) * 1.0;
      return { spawnInterval, sideSpawnChance, fastProb, baseMult, fastMult };
    }
    function spawnArenaBullets() {
      const shipX = state.ship.x;
      const shipY = state.ship.y;
      const refSpeed = Math.max(1, Math.hypot(state.ship.vx, state.ship.vy));
        const params = getArenaParams(state.stage);
        const baseMult = params.baseMult;
        const fastMult = params.fastMult;
        const fastProb = params.fastProb;
        const sideSpawnChance = params.sideSpawnChance;
      const margin = 12;
      const positions = [
        { x: -margin, y: Math.random() * canvas.height },
        { x: canvas.width + margin, y: Math.random() * canvas.height },
        { x: Math.random() * canvas.width, y: -margin },
        { x: Math.random() * canvas.width, y: canvas.height + margin }
      ];
      for (const p of positions) {
        // skip some sides occasionally to reduce overall amount
        if (Math.random() > sideSpawnChance) continue;
        const mult = Math.random() < fastProb ? fastMult : baseMult;
        const speed = refSpeed * mult;
        const dx = shipX - p.x;
        const dy = shipY - p.y;
        const len = Math.hypot(dx, dy) || 1;
        const vx = (dx / len) * speed;
        const vy = (dy / len) * speed;
        state.arena.bullets.push({ x: p.x, y: p.y, vx, vy, radius: 4 });
      }
    }

    function updateArenaBullets() {
      // spawn timing
      state.arena.spawnTimer++;
        const params = getArenaParams(state.stage);
        if (state.arena.spawnTimer >= params.spawnInterval) {
          state.arena.spawnTimer = 0;
          spawnArenaBullets();
        }

      const toRemove = new Set();
      for (let i = 0; i < state.arena.bullets.length; i++) {
        const b = state.arena.bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        // collision with ship
        const dx = b.x - state.ship.x;
        const dy = b.y - state.ship.y;
        if (dx * dx + dy * dy <= (b.radius + state.ship.radius) * (b.radius + state.ship.radius)) {
          toRemove.add(i);
          state.ship.hp = Math.max(0, state.ship.hp - 5);
          createExplosion(b.x, b.y, "red");
          if (state.ship.hp <= 0) {
            state.running = false;
            state.gameOver = true;
          }
        }
        // remove offscreen far
        if (b.x < -120 || b.x > canvas.width + 120 || b.y < -120 || b.y > canvas.height + 120) {
          toRemove.add(i);
        }
      }
      if (toRemove.size > 0) {
        state.arena.bullets = state.arena.bullets.filter((_, idx) => !toRemove.has(idx));
      }
    }

    function drawArenaBullets() {
      for (const b of state.arena.bullets) {
        ctx.fillStyle = "rgba(255,80,60,0.95)";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,160,140,0.35)";
        ctx.fillRect(b.x - 6, b.y - 1, 12, 2);
      }
    }

    // rounded rect helper
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function updateExplosions() {
      for (const p of state.explosions) {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.life -= 1;
      }
      state.explosions = state.explosions.filter((p) => p.life > 0);
    }

    function update() {
      // always advance global frame (keeps animations consistent) and caption timer
      state.frame++;
      if (state.captionTimer > 0) state.captionTimer--;

      // handle goal hold countdown (runs even while paused)
      if (state.goalHold && state.goalHold.active) {
        state.goalHold.frames--;
        // update arena bullets during goal hold
        updateArenaBullets();
        if (state.goalHold.frames <= 0) {
          state.goalHold.active = false;
          state.pendingStageAdvance = false;
          state.stage += 1;
          state.stageTimer = 0;
          // reset mega HP for new stage
          state.megaHp = null;
          state.megaHpSpawned = false;
          // begin next stage with wide intro
          beginStage();
          // reset arena bullets
          state.arena.bullets.length = 0;
          state.arena.spawnTimer = 0;
        }
      }

      if (!state.running) return;

      // advance stage timer (frames)
      state.stageTimer++;
      // stage duration increases by 10 seconds per stage (stage 1 = base duration)
      const stageSecs = state.stageDuration + (state.stage - 1) * 10;
      const stageFrames = Math.round(stageSecs * 60);
      if (state.stageTimer >= stageFrames) {
        // stage goal reached — trigger goal caption once and mark pending advance
        state.stageTimer = stageFrames;
        if (!state.pendingStageAdvance) {
          state.pendingStageAdvance = true;
          // show GOAL caption
          showCaption("STAGE " + state.stage + " GOAL", 180);
          // initialize goal hold: create full-width chamber and pause scroll for 30s
          state.goalHold.active = true;
          state.goalHold.frames = 30 * 60;
          // reset arena spawn timer and bullets for hold
          state.arena.spawnTimer = 0;
          state.arena.bullets.length = 0;
          // start the NEXT STAGE countdown when entering the wide chamber
          state.stageIntro.active = true;
          state.stageIntro.phase = 'countdown';
          state.stageIntro.total = state.goalHold.frames;
          state.stageIntro.frames = state.goalHold.frames;
          state.stageIntro.startGap = tunnel.gap;
          // widen the entire visible tunnel to form a chamber (full screen)
          for (let cx = 0; cx < canvas.width; cx++) {
            state.columns[cx] = { top: 24, bottom: canvas.height - 24 };
          }
        }
      }

      state.speed = Math.min(state.maxSpeed, state.speed + 0.00075);
      state.scrollSpeed = state.effects.slowTimer > 0 ? state.speed * 0.72 : state.speed;
      // enforce scroll freeze during goal hold
      if (state.goalHold && state.goalHold.active) state.scrollSpeed = 0;
      // handle stage intro phases
      if (state.stageIntro && state.stageIntro.active) {
        // countdown phase
        if (state.stageIntro.phase === 'countdown') {
          state.stageIntro.frames = Math.max(0, state.stageIntro.frames - 1);
          if (state.stageIntro.frames <= 0) {
            // switch to narrowing phase
            state.stageIntro.phase = 'narrow';
            state.stageIntro.total = Math.round(3 * 60);
            state.stageIntro.frames = state.stageIntro.total;
            state.stageIntro.startGap = tunnel.gap;
            // clear arena bullets
            state.arena.bullets.length = 0;
          }
        } else if (state.stageIntro.phase === 'narrow') {
          state.stageIntro.frames = Math.max(0, state.stageIntro.frames - 1);
          const total = Math.max(1, state.stageIntro.total || 1);
          const progress = 1 - state.stageIntro.frames / total; // 0..1
          const targetGap = 170;
          const startGap = state.stageIntro.startGap || tunnel.gap;
          tunnel.gap = startGap * (1 - progress) + targetGap * progress;
          if (state.stageIntro.frames <= 0) {
            state.stageIntro.active = false;
          }
        }
      }
      if (state.effects.slowTimer > 0) state.effects.slowTimer--;
      if (state.effects.wideTimer > 0) state.effects.wideTimer--;
      if (state.bonusTimer > 0) state.bonusTimer--;
      updateStars();
      updateColumns();
      updateShip();
      updateBullets();
      updateBombs();
      updateExplosions();
      updateHpItems();
      updateMegaHp();
      // smooth display score for visible count-up
      state.displayScore += (state.score - state.displayScore) * 0.18;
      // collision handling: count contact duration and apply 5 HP every 0.1s
      const penetration = getCollisionPenetration();
      // assume ~60fps; 0.1s -> ~6 frames (round to nearest)
      const CONTACT_FRAMES_THRESHOLD = Math.max(1, Math.round(0.1 * 60));
      if (penetration > 0) {
        state.ship.contactFrames++;
        if (state.ship.contactFrames >= CONTACT_FRAMES_THRESHOLD) {
          state.ship.contactFrames = 0;
          state.ship.hp = Math.max(0, state.ship.hp - 5);
          if (state.ship.hp <= 0) {
            createExplosion(state.ship.x, state.ship.y, "red");
            state.running = false;
            state.gameOver = true;
          }
        }
      } else {
        // reset contact counter and award score when not touching
        state.ship.contactFrames = 0;
        state.score += 1;
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#030611";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (const s of state.stars) {
        const a = 0.3 + s.z * 0.5;
        ctx.fillStyle = `rgba(180, 200, 255, ${a})`;
        ctx.fillRect(s.x, s.y, s.z * 2, s.z * 2);
      }
    }

    function drawTunnel() {
      ctx.fillStyle = "#193164";
      for (let x = 0; x < state.columns.length; x++) {
        const c = state.columns[x];
        ctx.fillRect(x, 0, 1, c.top);
        ctx.fillRect(x, c.bottom, 1, canvas.height - c.bottom);
      }

      ctx.fillStyle = "#5ca2ff";
      for (let x = 0; x < state.columns.length; x += 3) {
        const c = state.columns[x];
        ctx.fillRect(x, c.top - 2, 2, 2);
        ctx.fillRect(x, c.bottom, 2, 2);
      }

      for (const base of state.bases) {
        const style = baseStyles[base.color];
        ctx.fillStyle = style.fill;
        ctx.fillRect(base.x, base.y, base.w, base.h);
        ctx.strokeStyle = style.edge;
        ctx.lineWidth = 1;
        ctx.strokeRect(base.x + 0.5, base.y + 0.5, base.w - 1, base.h - 1);
      }
    }

    function drawShip() {
      const { x, y, radius } = state.ship;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(state.ship.vy * 0.05);

      ctx.fillStyle = "#ffd966";
      ctx.beginPath();
      ctx.moveTo(radius + 6, 0);
      ctx.lineTo(-radius, -radius * 0.85);
      ctx.lineTo(-radius + 4, 0);
      ctx.lineTo(-radius, radius * 0.85);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#6fc2ff";
      ctx.beginPath();
      ctx.arc(-2, 0, 4, 0, Math.PI * 2);
      ctx.fill();

      if (state.running) {
        const flame = 8 + Math.random() * 8;
        ctx.fillStyle = "#ff8c42";
        ctx.beginPath();
        ctx.moveTo(-radius + 2, 0);
        ctx.lineTo(-radius - flame, -3);
        ctx.lineTo(-radius - flame, 3);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawBullets() {
      for (const b of state.bullets) {
        ctx.fillStyle = "#ffcf70";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255, 180, 80, 0.45)";
        ctx.fillRect(b.x - 12, b.y - 1, 10, 2);
      }
    }

    function drawBombs() {
      for (const b of state.bombs) {
        // shadow
        ctx.fillStyle = "rgba(0,0,0,0.28)";
        ctx.beginPath();
        ctx.ellipse(b.x + 3, b.y + 6, b.radius + 2, b.radius * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();

        // bomb body
        ctx.fillStyle = "#b05b2c";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();

        // small fuse glow
        ctx.fillStyle = "rgba(255,140,40,0.18)";
        ctx.fillRect(b.x - 2, b.y - 6, 4, 6);
      }
    }

    function drawExplosions() {
      for (const p of state.explosions) {
        const alpha = Math.max(0, p.life / p.maxLife);
        const style = baseStyles[p.color];
        ctx.fillStyle = `${style.edge}${alpha < 0.7 ? "" : ""}`;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.6 + (1 - alpha) * 2.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function drawHud() {
      ctx.fillStyle = "#dbe6ff";
      ctx.font = "20px ui-monospace, SFMono-Regular, Menlo, monospace";
      ctx.fillText(`SCORE ${Math.floor(state.displayScore)}`, 20, 32);
      ctx.fillText(`SPD ${state.scrollSpeed.toFixed(2)}`, 20, 58);

      // remaining time for current stage
      if (state.running) {
        const stageSecs = state.stageDuration + (state.stage - 1) * 10;
        const stageFrames = Math.round(stageSecs * 60);
        const remainingFrames = Math.max(0, stageFrames - state.stageTimer);
        const remainingSecs = Math.ceil(remainingFrames / 60);
        ctx.fillText(`TIME ${remainingSecs}s`, 20, 84);
      }

      // HP bar (右上)
      const hp = typeof state.ship.hp === 'number' ? state.ship.hp : 0;
      const maxHp = 100;
      const barW = 200;
      const barH = 14;
      const bx = canvas.width - barW - 20;
      const by = 18;
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(bx, by, barW, barH);
      const pct = Math.max(0, Math.min(1, hp / maxHp));
      ctx.fillStyle = pct > 0.6 ? "#4caf50" : pct > 0.3 ? "#ffb300" : "#e53935";
      ctx.fillRect(bx + 1, by + 1, Math.max(2, (barW - 2) * pct), barH - 2);
      ctx.strokeStyle = "#9db0ff";
      ctx.lineWidth = 1;
      ctx.strokeRect(bx + 0.5, by + 0.5, barW - 0, barH - 0);
      ctx.fillStyle = "#dbe6ff";
      ctx.font = "12px ui-monospace, SFMono-Regular, Menlo, monospace";
      ctx.textAlign = "center";
      ctx.fillText(`HP ${Math.floor(hp)}/${maxHp}`, bx + barW / 2, by + barH - 3);
      ctx.textAlign = "left";

      if (state.bonusTimer > 0) {
        ctx.fillStyle = "#ffe08a";
        ctx.font = "16px ui-monospace, SFMono-Regular, Menlo, monospace";
        ctx.fillText(state.bonusText, 20, 110);
      }

      if (state.gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = "bold 54px ui-sans-serif, system-ui";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "24px ui-sans-serif, system-ui";
        ctx.fillText("Space で再スタート", canvas.width / 2, canvas.height / 2 + 28);
        ctx.textAlign = "left";
      }

      // arena countdown display (during stage intro countdown)
      if (state.stageIntro && state.stageIntro.active && state.stageIntro.phase === 'countdown') {
        const remaining = Math.ceil(state.stageIntro.frames / 60);
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(canvas.width / 2 - 120, 16, 240, 46);
        ctx.fillStyle = "#fff6c8";
        ctx.textAlign = "center";
        ctx.font = "bold 24px ui-sans-serif, system-ui";
        ctx.fillText(`NEXT STAGE IN ${remaining}s`, canvas.width / 2, 16 + 32);
        ctx.restore();
        ctx.textAlign = "left";
      }

      // caption (stage start / goal)
      if (state.captionTimer > 0 && state.caption) {
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(canvas.width / 2 - 260, 60, 520, 64);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = "bold 28px ui-sans-serif, system-ui";
        ctx.fillText(state.caption, canvas.width / 2, 60 + 42);
        ctx.restore();
        ctx.textAlign = "left";
      }
    }

    function render() {
      drawBackground();
      drawTunnel();
      drawMegaHp();
      drawArenaBullets();
      drawHpItems();
      drawBullets();
      drawBombs();
      drawExplosions();
      drawShip();
      drawHud();
    }

    function showCaption(text, frames) {
      state.caption = text;
      state.captionTimer = Math.max(0, frames | 0);
    }

    function beginStage() {
      // show caption
      showCaption(`STAGE ${state.stage} START`, 120);
      // set wide starting gap and seed columns to show wide space
      const wideGap = Math.max(tunnel.maxGap, tunnel.gap, 360);
      tunnel.gap = wideGap;
      // immediately enter narrowing phase for stage start (no initial countdown)
      state.stageIntro.total = Math.round(3 * 60);
      state.stageIntro.frames = state.stageIntro.total;
      state.stageIntro.startGap = wideGap;
      state.stageIntro.phase = 'narrow';
      state.stageIntro.active = true;
      // rebuild columns as wide
      for (let cx = 0; cx < canvas.width; cx++) {
        state.columns[cx] = { top: 24, bottom: canvas.height - 24 };
      }
      // ensure game runs and scrolling happens
      state.running = true;
      // reset arena bullets
      state.arena.bullets.length = 0;
      state.arena.spawnTimer = 0;
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowUp" || e.code === "KeyW") {
        state.input.up = true;
        e.preventDefault();
      } else if (e.code === "ArrowDown" || e.code === "KeyS") {
        state.input.down = true;
        e.preventDefault();
      } else if (e.code === "ArrowLeft" || e.code === "KeyA") {
        state.input.left = true;
        e.preventDefault();
      } else if (e.code === "ArrowRight" || e.code === "KeyD") {
        state.input.right = true;
        e.preventDefault();
      } else if (e.code === "KeyX") {
        fireVulcan();
        e.preventDefault();
      } else if (e.code === "KeyZ") {
        dropBomb();
        e.preventDefault();
      } else if (e.code === "Space" && !state.running) {
        resetGame();
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowUp" || e.code === "KeyW") {
        state.input.up = false;
      } else if (e.code === "ArrowDown" || e.code === "KeyS") {
        state.input.down = false;
      } else if (e.code === "ArrowLeft" || e.code === "KeyA") {
        state.input.left = false;
      } else if (e.code === "ArrowRight" || e.code === "KeyD") {
        state.input.right = false;
      }
    });

    // restart button removed for mobile UI; use in-game controls to restart

    startButton.addEventListener("click", startGame);

    function setTouchControl(button, actionKey, enabled) {
      state.input[actionKey] = enabled;
      button.classList.toggle("active", enabled);
    }

    function bindTouchControl(button, actionKey) {
      const start = (e) => {
        e.preventDefault();
        setTouchControl(button, actionKey, true);
      };
      const end = (e) => {
        e.preventDefault();
        setTouchControl(button, actionKey, false);
      };

      button.addEventListener("pointerdown", start, { passive: false });
      button.addEventListener("pointerup", end, { passive: false });
      button.addEventListener("pointerleave", end, { passive: false });
      button.addEventListener("pointercancel", end, { passive: false });
      button.addEventListener("touchstart", start, { passive: false });
      button.addEventListener("touchend", end, { passive: false });
      button.addEventListener("touchcancel", end, { passive: false });
    }

    bindTouchControl(touchUp, "up");
    bindTouchControl(touchLeft, "left");
    bindTouchControl(touchRight, "right");
    bindTouchControl(touchDown, "down");

    // Make fire (X) and bomb (Z) buttons draggable via long-press; short press triggers action
    function makeDraggableAction(button, onShortPress) {
      if (!button) return;
      let longPressTimer = null;
      let dragging = false;
      let startX = 0, startY = 0, offsetX = 0, offsetY = 0;
      const wrap = document.querySelector('.wrap');

      // restore saved position
      try {
        const saved = localStorage.getItem('btnpos-' + button.id);
        if (saved) {
          const p = JSON.parse(saved);
          button.style.position = 'absolute';
          button.style.left = p.x + 'px';
          button.style.top = p.y + 'px';
          wrap.appendChild(button);
        }
      } catch (e) {}

      const beginDrag = (clientX, clientY) => {
        dragging = true;
        button.classList.add('dragging');
        button.style.position = 'absolute';
        wrap.appendChild(button);
        offsetX = clientX - button.getBoundingClientRect().left;
        offsetY = clientY - button.getBoundingClientRect().top;
      };

      const onPointerMove = (e) => {
        if (!dragging) return;
        const clientX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
        const clientY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
        button.style.left = Math.max(6, Math.min(wrap.clientWidth - button.offsetWidth - 6, clientX - offsetX)) + 'px';
        button.style.top = Math.max(6, Math.min(wrap.clientHeight - button.offsetHeight - 6, clientY - offsetY)) + 'px';
      };

      const onPointerDown = (e) => {
        e.preventDefault();
        const clientX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
        const clientY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
        startX = clientX; startY = clientY;
        // attach temporary global handlers for this press
        const moveHandler = (ev) => onPointerMove(ev);
        const upHandler = (ev) => {
          // ensure we cleanup handlers first
          window.removeEventListener('pointermove', moveHandler);
          window.removeEventListener('pointerup', upHandler);
          window.removeEventListener('touchmove', moveHandler);
          window.removeEventListener('touchend', upHandler);
          // call common end logic
          endPointer(ev);
        };
        window.addEventListener('pointermove', moveHandler, { passive: false });
        window.addEventListener('pointerup', upHandler, { passive: false });
        window.addEventListener('touchmove', moveHandler, { passive: false });
        window.addEventListener('touchend', upHandler, { passive: false });
        longPressTimer = setTimeout(() => {
          beginDrag(clientX, clientY);
          longPressTimer = null;
        }, 300);
      };

      const endPointer = (e) => {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        if (dragging) {
          dragging = false;
          button.classList.remove('dragging');
          try {
            localStorage.setItem('btnpos-' + button.id, JSON.stringify({ x: parseInt(button.style.left||0,10), y: parseInt(button.style.top||0,10) }));
          } catch (err) {}
          return;
        }
        // short press -> trigger action
        onShortPress();
        button.classList.add('active');
        setTimeout(() => button.classList.remove('active'), 120);
      };

      button.addEventListener('pointerdown', onPointerDown, { passive: false });
      button.addEventListener('touchstart', onPointerDown, { passive: false });
    }

    makeDraggableAction(touchFire, () => fireVulcan());
    makeDraggableAction(touchBomb, () => dropBomb());

    if ("ontouchstart" in window || navigator.maxTouchPoints > 0) {
      touchPad.style.display = "grid";
      firePad.style.display = "block";
      updateGyroStatus("iPhone は右下の十字キーで移動、右のXでバルカン発射できます");
    } else {
      updateGyroStatus("PCはキーボード、スマホは右下コントローラーで移動と発射ができます");
    }
    loop();
  </script>
</body>
</html>
