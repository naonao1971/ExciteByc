<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scramble Tunnel Prototype</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #07090f;
      color: #e8ecff;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      position: relative;
      text-align: center;
    }
    canvas {
      width: min(92vw, 960px);
      height: auto;
      border: 1px solid #2a365f;
      box-shadow: 0 0 32px rgba(90, 140, 255, 0.2);
      background: linear-gradient(#02040a, #060b18);
      image-rendering: pixelated;
    }
    .help {
      margin-top: 10px;
      color: #9db0ff;
      font-size: 14px;
    }
    .mobile-controls {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .mobile-controls button {
      appearance: none;
      border: 1px solid #4d5f95;
      background: linear-gradient(180deg, #1b2a52, #10192f);
      color: #eef4ff;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }
    .mobile-controls button:disabled {
      opacity: 0.55;
    }
    .mobile-controls .restart {
      border-color: #8b6c3c;
      background: linear-gradient(180deg, #5a3f15, #2c1e08);
    }
    .mobile-controls .start {
      border-color: #3f8b72;
      background: linear-gradient(180deg, #17604c, #0f362c);
    }
    .hud-start {
      position: absolute;
      top: 12px;
      left: 160px;
      z-index: 2;
      padding: 8px 14px;
      font-size: 14px;
    }
    .status {
      min-height: 1.4em;
      color: #b9c8ff;
      font-size: 13px;
    }
    .touch-pad {
      position: absolute;
      right: 14px;
      bottom: 170px;
      z-index: 3;
      display: none;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 8px;
      pointer-events: none;
    }
    .touch-up {
      grid-column: 2;
      grid-row: 1;
    }
    .touch-left {
      grid-column: 1;
      grid-row: 2;
    }
    .touch-right {
      grid-column: 3;
      grid-row: 2;
    }
    .touch-down {
      grid-column: 2;
      grid-row: 3;
    }
    .touch-btn {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid #3f558e;
      background: rgba(16, 28, 56, 0.72);
      color: #f2f6ff;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .touch-btn:active,
    .touch-btn.active {
      background: rgba(71, 118, 224, 0.86);
      border-color: #7db0ff;
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="960" height="540" aria-label="Scramble tunnel game"></canvas>
    <div class="help">↑↓←→ / WASD で移動、Space でリスタート</div>
    <div class="mobile-controls">
      <button id="restartButton" class="restart" type="button">再スタート</button>
      <div id="gyroStatus" class="status">傾き操作は未有効です</div>
    </div>
    <div id="touchPad" class="touch-pad" aria-label="タッチコントローラー">
      <button id="touchUp" class="touch-btn touch-up" type="button" aria-label="上昇">▲</button>
      <button id="touchLeft" class="touch-btn touch-left" type="button" aria-label="左移動">◀</button>
      <button id="touchRight" class="touch-btn touch-right" type="button" aria-label="右移動">▶</button>
      <button id="touchDown" class="touch-btn touch-down" type="button" aria-label="下降">▼</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const restartButton = document.getElementById("restartButton");
    const gyroStatus = document.getElementById("gyroStatus");
    const touchPad = document.getElementById("touchPad");
    const touchUp = document.getElementById("touchUp");
    const touchLeft = document.getElementById("touchLeft");
    const touchRight = document.getElementById("touchRight");
    const touchDown = document.getElementById("touchDown");

    const startButton = document.createElement("button");
    startButton.id = "startButton";
    startButton.type = "button";
    startButton.className = "start hud-start";
    startButton.textContent = "スタート";
    document.querySelector(".wrap").appendChild(startButton);

    const state = {
      running: true,
      score: 0,
      speed: 2.6,
      maxSpeed: 6.2,
      columns: [],
      stars: [],
      frame: 0,
      ship: {
        x: 130,
        y: canvas.height / 2,
        vx: 0,
        vy: 0,
        radius: 11
      },
      input: { up: false, down: false, left: false, right: false }
    };

    const tunnel = {
      center: canvas.height / 2,
      centerVel: 0,
      gap: 170,
      minGap: 96,
      maxGap: 220,
      roughness: 0.42
    };

    for (let i = 0; i < 160; i++) {
      state.stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: 0.4 + Math.random() * 0.9
      });
    }

    function seedColumns() {
      state.columns.length = 0;
      let localCenter = tunnel.center;
      for (let x = 0; x < canvas.width; x++) {
        state.columns.push(makeColumn(localCenter, tunnel.gap));
      }
    }

    function makeColumn(center, gap) {
      const half = gap * 0.5;
      return {
        top: Math.max(20, center - half),
        bottom: Math.min(canvas.height - 20, center + half)
      };
    }

    function resetGame() {
      state.running = true;
      state.score = 0;
      state.speed = 2.6;
      state.frame = 0;
      state.ship.x = 130;
      state.ship.y = canvas.height / 2;
      state.ship.vx = 0;
      state.ship.vy = 0;

      tunnel.center = canvas.height / 2;
      tunnel.centerVel = 0;
      tunnel.gap = 170;
      seedColumns();
    }

    function startGame() {
      resetGame();
      updateGyroStatus("開始しました。右下コントローラーで操作できます");
    }

    function updateGyroStatus(message) {
      gyroStatus.textContent = message;
    }

    function updateTunnel() {
      const drift = (Math.random() - 0.5) * tunnel.roughness;
      tunnel.centerVel += drift;
      tunnel.centerVel *= 0.96;
      tunnel.center += tunnel.centerVel;
      tunnel.center = Math.max(90, Math.min(canvas.height - 90, tunnel.center));

      const wave = Math.sin(state.frame * 0.012) * 22;
      const gapTarget = 145 + wave - Math.min(38, state.speed * 7);
      tunnel.gap += (gapTarget - tunnel.gap) * 0.03;
      tunnel.gap = Math.max(tunnel.minGap, Math.min(tunnel.maxGap, tunnel.gap));
    }

    function updateColumns() {
      const step = state.speed;
      for (let i = 0; i < step; i++) {
        state.columns.shift();
        updateTunnel();
        state.columns.push(makeColumn(tunnel.center, tunnel.gap));
      }
    }

    function updateShip() {
      const verticalThrust = 0.34;
      const horizontalThrust = 0.28;
      const drag = 0.985;
      if (state.input.up) state.ship.vy -= verticalThrust;
      if (state.input.down) state.ship.vy += verticalThrust;
      if (state.input.left) state.ship.vx -= horizontalThrust;
      if (state.input.right) state.ship.vx += horizontalThrust;
      state.ship.vx *= drag;
      state.ship.vy *= drag;
      state.ship.x += state.ship.vx;
      state.ship.y += state.ship.vy;
      state.ship.x = Math.max(state.ship.radius + 8, Math.min(canvas.width - state.ship.radius - 8, state.ship.x));
      state.ship.y = Math.max(state.ship.radius, Math.min(canvas.height - state.ship.radius, state.ship.y));
    }

    function checkCollision() {
      const x = Math.floor(state.ship.x);
      const column = state.columns[x];
      if (!column) return false;
      return (
        state.ship.y - state.ship.radius < column.top ||
        state.ship.y + state.ship.radius > column.bottom
      );
    }

    function updateStars() {
      for (const s of state.stars) {
        s.x -= state.speed * s.z * 0.4;
        if (s.x < -2) {
          s.x = canvas.width + Math.random() * 16;
          s.y = Math.random() * canvas.height;
        }
      }
    }

    function update() {
      if (!state.running) return;
      state.frame++;
      state.speed = Math.min(state.maxSpeed, state.speed + 0.00075);
      updateStars();
      updateColumns();
      updateShip();
      if (checkCollision()) {
        state.running = false;
      } else {
        state.score += 1;
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#030611";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (const s of state.stars) {
        const a = 0.3 + s.z * 0.5;
        ctx.fillStyle = `rgba(180, 200, 255, ${a})`;
        ctx.fillRect(s.x, s.y, s.z * 2, s.z * 2);
      }
    }

    function drawTunnel() {
      ctx.fillStyle = "#193164";
      for (let x = 0; x < state.columns.length; x++) {
        const c = state.columns[x];
        ctx.fillRect(x, 0, 1, c.top);
        ctx.fillRect(x, c.bottom, 1, canvas.height - c.bottom);
      }

      ctx.fillStyle = "#5ca2ff";
      for (let x = 0; x < state.columns.length; x += 3) {
        const c = state.columns[x];
        ctx.fillRect(x, c.top - 2, 2, 2);
        ctx.fillRect(x, c.bottom, 2, 2);
      }
    }

    function drawShip() {
      const { x, y, radius } = state.ship;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(state.ship.vy * 0.05);

      ctx.fillStyle = "#ffd966";
      ctx.beginPath();
      ctx.moveTo(radius + 6, 0);
      ctx.lineTo(-radius, -radius * 0.85);
      ctx.lineTo(-radius + 4, 0);
      ctx.lineTo(-radius, radius * 0.85);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#6fc2ff";
      ctx.beginPath();
      ctx.arc(-2, 0, 4, 0, Math.PI * 2);
      ctx.fill();

      if (state.running) {
        const flame = 8 + Math.random() * 8;
        ctx.fillStyle = "#ff8c42";
        ctx.beginPath();
        ctx.moveTo(-radius + 2, 0);
        ctx.lineTo(-radius - flame, -3);
        ctx.lineTo(-radius - flame, 3);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawHud() {
      ctx.fillStyle = "#dbe6ff";
      ctx.font = "20px ui-monospace, SFMono-Regular, Menlo, monospace";
      ctx.fillText(`SCORE ${Math.floor(state.score / 8)}`, 20, 32);
      ctx.fillText(`SPD ${state.speed.toFixed(2)}`, 20, 58);

      if (!state.running) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = "bold 54px ui-sans-serif, system-ui";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "24px ui-sans-serif, system-ui";
        ctx.fillText("Space で再スタート", canvas.width / 2, canvas.height / 2 + 28);
        ctx.textAlign = "left";
      }
    }

    function render() {
      drawBackground();
      drawTunnel();
      drawShip();
      drawHud();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowUp" || e.code === "KeyW") {
        state.input.up = true;
        e.preventDefault();
      } else if (e.code === "ArrowDown" || e.code === "KeyS") {
        state.input.down = true;
        e.preventDefault();
      } else if (e.code === "ArrowLeft" || e.code === "KeyA") {
        state.input.left = true;
        e.preventDefault();
      } else if (e.code === "ArrowRight" || e.code === "KeyD") {
        state.input.right = true;
        e.preventDefault();
      } else if (e.code === "Space" && !state.running) {
        resetGame();
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowUp" || e.code === "KeyW") {
        state.input.up = false;
      } else if (e.code === "ArrowDown" || e.code === "KeyS") {
        state.input.down = false;
      } else if (e.code === "ArrowLeft" || e.code === "KeyA") {
        state.input.left = false;
      } else if (e.code === "ArrowRight" || e.code === "KeyD") {
        state.input.right = false;
      }
    });

    restartButton.addEventListener("click", () => {
      resetGame();
      updateGyroStatus("再スタートしました。右下コントローラーで操作できます");
    });

    startButton.addEventListener("click", startGame);

    function setTouchControl(button, actionKey, enabled) {
      state.input[actionKey] = enabled;
      button.classList.toggle("active", enabled);
    }

    function bindTouchControl(button, actionKey) {
      const start = (e) => {
        e.preventDefault();
        setTouchControl(button, actionKey, true);
      };
      const end = (e) => {
        e.preventDefault();
        setTouchControl(button, actionKey, false);
      };

      button.addEventListener("pointerdown", start, { passive: false });
      button.addEventListener("pointerup", end, { passive: false });
      button.addEventListener("pointerleave", end, { passive: false });
      button.addEventListener("pointercancel", end, { passive: false });
      button.addEventListener("touchstart", start, { passive: false });
      button.addEventListener("touchend", end, { passive: false });
      button.addEventListener("touchcancel", end, { passive: false });
    }

    bindTouchControl(touchUp, "up");
    bindTouchControl(touchLeft, "left");
    bindTouchControl(touchRight, "right");
    bindTouchControl(touchDown, "down");

    if ("ontouchstart" in window || navigator.maxTouchPoints > 0) {
      touchPad.style.display = "grid";
      updateGyroStatus("iPhone は右下コントローラーで上下左右に操作できます");
    } else {
      updateGyroStatus("PCはキーボード、スマホは右下コントローラーで上下左右に操作できます");
    }
    loop();
  </script>
</body>
</html>
